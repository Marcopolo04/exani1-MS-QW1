<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador EXANI-I CENEVAL</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --success: #22c55e;
            --error: #ef4444;
            --bg: #f3f4f6;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card);
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1, h2 { color: #1f2937; }

        .hidden { display: none; }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Buttons */
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn:hover { background-color: var(--secondary); }
        .btn:disabled { background-color: #9ca3af; cursor: not-allowed; }

        /* Timer */
        #timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--error);
            margin-bottom: 1rem;
        }

        /* Question Styles */
        .question-meta {
            display: flex;
            justify-content: space-between;
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid #e5e7eb;
            color: #374151;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .option-btn:hover { border-color: var(--primary); background-color: #eff6ff; }
        
        /* Feedback States */
        .correct { background-color: #dcfce7 !important; border-color: var(--success) !important; color: #14532d !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: var(--error) !important; color: #7f1d1d !important; }

        /* Results */
        .score-circle {
            width: 150px;
            height: 150px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px auto;
        }
        
        .loading {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- PANTALLA DE LOGIN -->
        <div id="login-screen">
            <h1>Simulador EXANI-I</h1>
            <p>48 Preguntas | 3 Opciones | Cronómetro</p>
            <input type="text" id="username" placeholder="Tu Nombre Completo" required>
            <input type="email" id="useremail" placeholder="Tu Correo Electrónico" required>
            <button class="btn" onclick="startExam()">Comenzar Examen</button>
        </div>

        <!-- PANTALLA DE EXAMEN -->
        <div id="exam-screen" class="hidden">
            <div id="timer">00:00</div>
            <div class="question-meta">
                <span id="q-number">Pregunta 1/48</span>
                <span id="q-category">Matemáticas</span>
            </div>
            <h2 id="q-text">Texto de la pregunta...</h2>
            <div class="options-grid" id="options-container">
                <!-- Opciones generadas por JS -->
            </div>
            <div id="feedback-msg" style="margin-top:15px; font-weight:bold;"></div>
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Siguiente Pregunta</button>
        </div>

        <!-- PANTALLA DE RESULTADOS -->
        <div id="result-screen" class="hidden">
            <h2>Examen Finalizado</h2>
            <div class="score-circle" id="final-score">0%</div>
            <p id="result-msg">Enviando resultados...</p>
            <div class="loading" id="loading-spinner"></div>
        </div>
    </div>

    // VARIABLES DE ESTADO
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 3600; // 60 minutos en segundos
    let userData = { nombre: '', correo: '' };

    // ELEMENTOS DOM
    const loginScreen = document.getElementById('login-screen');
    const examScreen = document.getElementById('exam-screen');
    const resultScreen = document.getElementById('result-screen');
    const timerDisplay = document.getElementById('timer');

    function startExam() {
        const name = document.getElementById('username').value;
        const email = document.getElementById('useremail').value;

        if (!name || !email) {
            alert("Por favor ingresa tu nombre y correo");
            return;
        }

        userData.nombre = name;
        userData.correo = email;

        loginScreen.classList.add('hidden');
        examScreen.classList.remove('hidden');
        
        startTimer();
        loadQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                finishExam();
            }
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('q-number').textContent = `Pregunta ${currentQuestionIndex + 1}/${questions.length}`;
        document.getElementById('q-category').textContent = q.cat;
        document.getElementById('q-text').textContent = q.q;
        document.getElementById('feedback-msg').textContent = '';
        document.getElementById('next-btn').classList.add('hidden');

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        // Deshabilitar todos los botones
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        const currentQ = questions[currentQuestionIndex];
        const feedback = document.getElementById('feedback-msg');

        if (selectedIndex === currentQ.correct) {
            btnElement.classList.add('correct');
            feedback.textContent = "¡Correcto!";
            feedback.style.color = "var(--success)";
            score++;
        } else {
            btnElement.classList.add('incorrect');
            // Mostrar la correcta
            buttons[currentQ.correct].classList.add('correct');
            feedback.textContent = "Incorrecto";
            feedback.style.color = "var(--error)";
        }

        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            finishExam();
        }
    }

    function finishExam() {
        clearInterval(timerInterval);
        examScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');

        const percentage = Math.round((score / questions.length) * 100);
        document.getElementById('final-score').textContent = `${percentage}%`;
        
        const resultMsg = document.getElementById('result-msg');
        resultMsg.textContent = `Obtuviste ${score} de ${questions.length} aciertos.`;

        sendResultsToGoogle(percentage);
    }

    function sendResultsToGoogle(finalScore) {
        const data = {
            nombre: userData.nombre,
            correo: userData.correo,
            aciertos: score,
            total: questions.length
        };

        // Usamos 'no-cors' porque Google Apps Script a veces da problemas de CORS en frontend puro
        // Aunque la respuesta será opaca, el script del lado de Google sí recibirá los datos.
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            document.getElementById('loading-spinner').style.display = 'none';
            resultMsg.innerHTML += "<br><strong>Resultados enviados exitosamente al profesor.</strong>";
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('loading-spinner').style.display = 'none';
            resultMsg.innerHTML += "<br><span style='color:red'>Error al enviar resultados (revisa la consola).</span>";
        });
    }
</script>

</body>
</html>
